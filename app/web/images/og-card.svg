<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="DejaVu Sans, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1730"/>
      <stop offset="1" stop-color="#103a78"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d8bfd"/>
      <stop offset="1" stop-color="#0a58ca"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint map grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- decorative flight path with waypoints -->
  <g>
    <polyline points="690,150 800,210 910,160 1020,230 1120,170" fill="none"
              stroke="#6ea8fe" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.8"/>
    <g fill="#6ea8fe">
      <circle cx="690" cy="150" r="7"/><circle cx="800" cy="210" r="7"/>
      <circle cx="910" cy="160" r="7"/><circle cx="1020" cy="230" r="7"/><circle cx="1120" cy="170" r="7"/>
    </g>
  </g>

  <!-- logo badge (quadcopter) -->
  <g transform="translate(96,232) scale(2.34)">
    <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#badge)"/>
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round">
      <line x1="18" y1="18" x2="46" y2="46"/>
      <line x1="46" y1="18" x2="18" y2="46"/>
    </g>
    <g fill="none" stroke="#ffffff" stroke-width="2.5">
      <circle cx="18" cy="18" r="6.5"/><circle cx="46" cy="18" r="6.5"/>
      <circle cx="18" cy="46" r="6.5"/><circle cx="46" cy="46" r="6.5"/>
    </g>
    <rect x="25" y="25" width="14" height="14" rx="3.5" fill="#ffffff"/>
    <circle cx="32" cy="32" r="2.5" fill="#0a58ca"/>
  </g>

  <!-- wordmark + taglines -->
  <text x="300" y="300" font-size="86" font-weight="bold" fill="#ffffff">Mission Deck</text>
  <text x="303" y="352" font-size="36" font-weight="bold" fill="#6ea8fe">UAS Fleet Mission Control</text>
  <text x="303" y="398" font-size="25" fill="#ffffff" fill-opacity="0.65">Plan missions &#183; Live telemetry &#183; Fleet management</text>

  <text x="96" y="566" font-size="28" font-weight="bold" fill="#6ea8fe">mission-deck.app</text>
</svg>
