<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Mission Deck">
  <defs>
    <linearGradient id="md-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d8bfd"/>
      <stop offset="1" stop-color="#0a58ca"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#md-grad)"/>
  <!-- quadcopter arms -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round">
    <line x1="18" y1="18" x2="46" y2="46"/>
    <line x1="46" y1="18" x2="18" y2="46"/>
  </g>
  <!-- rotors -->
  <g fill="none" stroke="#ffffff" stroke-width="2.5">
    <circle cx="18" cy="18" r="6.5"/>
    <circle cx="46" cy="18" r="6.5"/>
    <circle cx="18" cy="46" r="6.5"/>
    <circle cx="46" cy="46" r="6.5"/>
  </g>
  <!-- flight controller body -->
  <rect x="25" y="25" width="14" height="14" rx="3.5" fill="#ffffff"/>
  <circle cx="32" cy="32" r="2.5" fill="#0a58ca"/>
</svg>
